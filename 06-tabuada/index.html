<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <script src="./scripit.js" defer></script>
  <title>Document</title>
</head>
<body>
  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Tabuada Estendida</h1>
    <p>Informe um número para gerar as operações de 1 a 10.</p>

    <div class="campo">
        <label>Número</label>
        <input id="quantidade" type="number" placeholder="Ex: 7" />
    </div>

    <button onclick="handleClick()">Gerar Tabuada</button>

    <div class="resultado">
        <p class="resultado-titulo">Resultado</p>
        <div class="tabela-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>N</th>
                        <th>Adição</th>
                        <th>Subtração</th>
                        <th>Multiplicação</th>
                        <th>Divisão</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr>
                        <td>1</td>
                        <td>8</td>
                        <td>6</td>
                        <td>7</td>
                        <td>7.00</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>9</td>
                        <td>5</td>
                        <td>14</td>
                        <td>3.50</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
